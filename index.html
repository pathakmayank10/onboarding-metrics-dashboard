<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Global Onboarding Metrics Dashboard</title>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <style>
        * { box-sizing: border-box; }
        html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .tab-btn {
            padding: 10px 20px;
            background: #1e293b;
            color: #94a3b8;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #1e3a5f;
            color: #f1f5f9;
        }
        .tab-btn:hover {
            background: #334155;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border-radius: 8px;
            overflow: hidden;
        }
        .data-table th {
            background: #1e3a5f;
            color: #f1f5f9;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid #334155;
        }
        .data-table td {
            padding: 12px;
            border-bottom: 1px solid #334155;
            color: #e2e8f0;
        }
        .data-table tr:hover {
            background: #0f172a;
        }
        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .stat-label {
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .stat-value {
            color: #f1f5f9;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script>
        const { useState, useEffect, createElement: h } = React;
        const { createRoot } = ReactDOM;
        
        function App() {
            const [activeTab, setActiveTab] = useState('ttgl');
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            
            useEffect(() => {
                const loadAllData = async () => {
                    try {
                        setLoading(true);
                        const [ttglRes, revRecRes, omRes] = await Promise.all([
                            fetch('ttgl_data.json').then(r => {
                                if (!r.ok) throw new Error(`TTGL: ${r.status}`);
                                return r.json();
                            }),
                            fetch('revrec_data.json').then(r => {
                                if (!r.ok) throw new Error(`RevRec: ${r.status}`);
                                return r.json();
                            }),
                            fetch('om_performance.json').then(r => {
                                if (!r.ok) throw new Error(`OM: ${r.status}`);
                                return r.json();
                            })
                        ]);
                        
                        setData({
                            ttgl: ttglRes,
                            revRec: revRecRes,
                            om: omRes
                        });
                        setError(null);
                    } catch (err) {
                        console.error('Data loading error:', err);
                        setError(err.message);
                    } finally {
                        setLoading(false);
                    }
                };
                
                loadAllData();
            }, []);
            
            if (loading) {
                return h('div', {
                    style: {
                        display: 'flex',
                        justifyContent: 'center',
                        alignItems: 'center',
                        height: '100vh',
                        color: '#f1f5f9',
                        fontSize: '18px',
                        gap: '10px'
                    }
                }, [
                    h('div', {
                        key: 'spinner',
                        style: {
                            width: '20px',
                            height: '20px',
                            border: '3px solid #1e293b',
                            borderTop: '3px solid #1e3a5f',
                            borderRadius: '50%',
                            animation: 'spin 1s linear infinite'
                        }
                    }),
                    h('span', { key: 'text' }, 'Loading Dashboard...')
                ]);
            }
            
            if (error) {
                return h('div', {
                    style: {
                        padding: '40px',
                        color: '#f87171',
                        fontSize: '16px',
                        background: 'linear-gradient(135deg, #0f172a 0%, #1e293b 100%)',
                        minHeight: '100vh',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center'
                    }
                }, h('div', {
                    style: {
                        background: '#1e293b',
                        padding: '20px',
                        borderRadius: '8px',
                        border: '1px solid #ef4444'
                    }
                }, [
                    h('h2', { key: 'title', style: { marginTop: 0 } }, '❌ Error Loading Dashboard'),
                    h('p', { key: 'msg' }, error),
                    h('p', { key: 'hint', style: { color: '#94a3b8', fontSize: '14px' } }, 'Make sure all JSON files (ttgl_data.json, revrec_data.json, om_performance.json) are in the same directory.'),
                    h('button', {
                        key: 'retry',
                        onClick: () => window.location.reload(),
                        style: {
                            background: '#1e3a5f',
                            color: '#f1f5f9',
                            border: 'none',
                            padding: '10px 20px',
                            borderRadius: '6px',
                            cursor: 'pointer'
                        }
                    }, 'Retry')
                ]));
            }
            
            if (!data) {
                return h('div', {
                    style: {
                        padding: '40px',
                        color: '#f1f5f9',
                        minHeight: '100vh',
                        background: 'linear-gradient(135deg, #0f172a 0%, #1e293b 100%)',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center'
                    }
                }, 'No data available');
            }
            
            const renderTTGL = () => {
                const months = data.ttgl.months || [];
                const regions = data.ttgl.regions || [];
                
                return h('div', { style: { padding: '20px' } }, [
                    h('h2', { key: 'title', style: { marginTop: 0, marginBottom: '20px', fontSize: '20px' } }, '📊 Time To Go Live (TTGL)'),
                    h('div', { key: 'summary', style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '16px', marginBottom: '30px' } },
                        regions.map(r => h('div', {
                            key: `card-${r.name}`,
                            className: 'stat-card'
                        }, [
                            h('div', { key: 'label', className: 'stat-label' }, r.name),
                            h('div', { key: 'value', className: 'stat-value' }, `${r.count || 0}`),
                            h('div', { key: 'subtitle', style: { color: '#94a3b8', fontSize: '12px', marginTop: '4px' } }, 'Closed Live Projects')
                        ]))
                    ),
                    h('div', { key: 'table-wrapper', style: { overflowX: 'auto' } },
                        h('table', { className: 'data-table' }, [
                            h('thead', { key: 'thead' },
                                h('tr', null, [
                                    h('th', { key: 'col-month' }, 'Month'),
                                    h('th', { key: 'col-region' }, 'Region'),
                                    h('th', { key: 'col-ttgl' }, 'Avg TTGL'),
                                    h('th', { key: 'col-count' }, 'Count')
                                ])
                            ),
                            h('tbody', { key: 'tbody' },
                                (data.ttgl.monthlyData || []).slice(0, 20).map((row, idx) =>
                                    h('tr', { key: `row-${idx}` }, [
                                        h('td', { key: 'month' }, row.month || '-'),
                                        h('td', { key: 'region' }, row.region || '-'),
                                        h('td', { key: 'ttgl' }, row.avgTTGL || '-'),
                                        h('td', { key: 'count' }, row.count || 0)
                                    ])
                                )
                            )
                        ])
                    )
                ]);
            };
            
            const renderRevRec = () => {
                const regions = data.revRec.regions || [];
                
                return h('div', { style: { padding: '20px' } }, [
                    h('h2', { key: 'title', style: { marginTop: 0, marginBottom: '20px', fontSize: '20px' } }, '💰 Revenue Realisation'),
                    h('div', { key: 'regions', style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '20px' } },
                        regions.map(r => h('div', {
                            key: `region-${r.region}`,
                            style: {
                                background: '#1e293b',
                                border: '1px solid #334155',
                                borderRadius: '8px',
                                padding: '16px',
                                overflow: 'x'
                            }
                        }, [
                            h('h3', { key: 'header', style: { margin: '0 0 12px 0', color: '#1e3a5f' } }, `${r.region} (${r.currency})`),
                            h('table', { key: 'table', className: 'data-table', style: { fontSize: '12px' } }, [
                                h('thead', null,
                                    h('tr', null, [
                                        h('th', { key: 'col1' }, 'Cohort'),
                                        h('th', { key: 'col2' }, 'CW Value'),
                                        h('th', { key: 'col3' }, 'Rev Realised'),
                                        h('th', { key: 'col4' }, '%')
                                    ])
                                ),
                                h('tbody', null,
                                    (r.cohorts || []).slice(0, 10).map((c, idx) =>
                                        h('tr', { key: `cohort-${idx}` }, [
                                            h('td', { key: 'cohort' }, c.cohort || '-'),
                                            h('td', { key: 'cw' }, c.cwValue || 0),
                                            h('td', { key: 'rev' }, c.revenueRealised || 0),
                                            h('td', { key: 'pct' }, c.percentageRealised || '0%')
                                        ])
                                    )
                                )
                            ])
                        ]))
                    )
                ]);
            };
            
            const renderOM = () => {
                const oms = (data.om.oms || []).slice(0, 50);
                
                return h('div', { style: { padding: '20px' } }, [
                    h('h2', { key: 'title', style: { marginTop: 0, marginBottom: '20px', fontSize: '20px' } }, '👥 OM Performance'),
                    h('div', { key: 'summary', style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '16px', marginBottom: '30px' } }, [
                        h('div', { key: 'card-oms', className: 'stat-card' }, [
                            h('div', { key: 'label', className: 'stat-label' }, 'Total OMs'),
                            h('div', { key: 'value', className: 'stat-value' }, data.om.oms?.length || 0)
                        ]),
                        h('div', { key: 'card-projects', className: 'stat-card' }, [
                            h('div', { key: 'label', className: 'stat-label' }, 'Total Projects'),
                            h('div', { key: 'value', className: 'stat-value' }, data.om.totalProjects || 0)
                        ]),
                        h('div', { key: 'card-sla', className: 'stat-card' }, [
                            h('div', { key: 'label', className: 'stat-label' }, 'Overall SLA %'),
                            h('div', { key: 'value', className: 'stat-value' }, `${data.om.overallSLA || 0}%`)
                        ]),
                        h('div', { key: 'card-ttgl', className: 'stat-card' }, [
                            h('div', { key: 'label', className: 'stat-label' }, 'Avg TTGL'),
                            h('div', { key: 'value', className: 'stat-value' }, data.om.avgTTGL || '-')
                        ])
                    ]),
                    h('div', { key: 'table-wrapper', style: { overflowX: 'auto' } },
                        h('table', { className: 'data-table' }, [
                            h('thead', { key: 'thead' },
                                h('tr', null, [
                                    h('th', { key: 'col-name' }, 'OM Name'),
                                    h('th', { key: 'col-region' }, 'Region'),
                                    h('th', { key: 'col-projects' }, 'Projects'),
                                    h('th', { key: 'col-live' }, 'Live %'),
                                    h('th', { key: 'col-ttgl' }, 'Avg TTGL'),
                                    h('th', { key: 'col-sla' }, 'SLA %')
                                ])
                            ),
                            h('tbody', { key: 'tbody' },
                                oms.map((om, idx) =>
                                    h('tr', { key: `om-${idx}` }, [
                                        h('td', { key: 'name' }, om.name || '-'),
                                        h('td', { key: 'region' }, om.region || '-'),
                                        h('td', { key: 'projects' }, om.projectCount || 0),
                                        h('td', { key: 'live' }, `${om.livePercent || 0}%`),
                                        h('td', { key: 'ttgl' }, om.avgTTGL || '-'),
                                        h('td', { key: 'sla' }, `${om.slaPercent || 0}%`)
                                    ])
                                )
                            )
                        ])
                    )
                ]);
            };
            
            return h('div', {
                style: {
                    minHeight: '100vh',
                    background: 'linear-gradient(135deg, #0f172a 0%, #1e293b 100%)',
                    color: '#f1f5f9'
                }
            }, [
                h('div', {
                    key: 'header',
                    style: {
                        borderBottom: '1px solid #334155',
                        padding: '20px',
                        background: 'rgba(15, 23, 42, 0.8)',
                        backdropFilter: 'blur(10px)'
                    }
                }, [
                    h('h1', { key: 'title', style: { margin: '0 0 20px 0', fontSize: '28px', fontWeight: 'bold' } }, '🌍 Global Onboarding Metrics Dashboard'),
                    h('div', { key: 'tabs', style: { display: 'flex', gap: '10px' } }, [
                        h('button', {
                            key: 'btn-ttgl',
                            className: `tab-btn ${activeTab === 'ttgl' ? 'active' : ''}`,
                            onClick: () => setActiveTab('ttgl')
                        }, '📊 TTGL'),
                        h('button', {
                            key: 'btn-revrec',
                            className: `tab-btn ${activeTab === 'revrec' ? 'active' : ''}`,
                            onClick: () => setActiveTab('revrec')
                        }, '💰 Revenue Realisation'),
                        h('button', {
                            key: 'btn-om',
                            className: `tab-btn ${activeTab === 'om' ? 'active' : ''}`,
                            onClick: () => setActiveTab('om')
                        }, '👥 OM Performance')
                    ])
                ]),
                
                h('div', { key: 'content' }, [
                    activeTab === 'ttgl' && renderTTGL(),
                    activeTab === 'revrec' && renderRevRec(),
                    activeTab === 'om' && renderOM()
                ]),
                
                h('style', { key: 'animations' }, `
                    @keyframes spin {
                        to { transform: rotate(360deg); }
                    }
                `)
            ]);
        }
        
        // Mount app
        window.addEventListener('DOMContentLoaded', () => {
            const root = createRoot(document.getElementById('root'));
            root.render(h(App));
        });
    </script>
</body>
</html>
