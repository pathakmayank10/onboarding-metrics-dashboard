<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding Metrics Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
    }
    #root { max-width: 1400px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 30px; font-size: 28px; }
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
    }
    button.active {
      background: #2563eb;
      color: white;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
    }
    button.inactive {
      background: #475569;
      color: #cbd5e1;
    }
    button:hover { opacity: 0.9; }
    .card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .card-header {
      background: #1e3a5f;
      color: white;
      padding: 12px 16px;
      border-radius: 4px;
      margin: -20px -20px 20px -20px;
      font-weight: 600;
      font-size: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th {
      background: #1e3a5f;
      color: white;
      padding: 8px;
      text-align: center;
      border: 1px solid #334155;
      font-weight: 600;
    }
    td {
      background: #162032;
      border: 1px solid #334155;
      padding: 8px;
      text-align: center;
    }
    tr:hover td { background: #1e293b; }
    .loading { text-align: center; padding: 40px; color: #94a3b8; }
    .error { color: #fca5a5; padding: 20px; background: #450a0a; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const { useState, useEffect, useRef } = React;
    const e = React.createElement;

    function TTGLSection() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        fetch('./ttgl_data.json')
          .then(r => r.json())
          .then(d => { console.log('TTGL data loaded:', d); setData(d); setLoading(false); })
          .catch(err => { console.error('TTGL error:', err); setLoading(false); });
      }, []);

      if (loading) return e('div', { className: 'loading' }, 'Loading TTGL...');
      if (!data) return e('div', { className: 'error' }, 'Failed to load TTGL data');

      return e('div', null,
        e('div', { className: 'card' },
          e('div', { className: 'card-header' }, '📊 TTGL Data'),
          data.months ? e('div', null,
            'Months: ' + data.months.join(', ')
          ) : 'No months data'
        )
      );
    }

    function RevRecSection() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        fetch('./revrec_data.json')
          .then(r => r.json())
          .then(d => { console.log('RevRec data loaded:', d); setData(d); setLoading(false); })
          .catch(err => { console.error('RevRec error:', err); setLoading(false); });
      }, []);

      if (loading) return e('div', { className: 'loading' }, 'Loading RevRec...');
      if (!data) return e('div', { className: 'error' }, 'Failed to load RevRec data');

      return e('div', null,
        e('div', { className: 'card' },
          e('div', { className: 'card-header' }, '💰 Revenue Realisation'),
          data.regions ? e('div', null,
            'Regions: ' + data.regions.map(r => r.name).join(', ')
          ) : 'No regions data'
        )
      );
    }

    function OMSection() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        fetch('./om_performance.json')
          .then(r => r.json())
          .then(d => { console.log('OM data loaded:', d); setData(d); setLoading(false); })
          .catch(err => { console.error('OM error:', err); setLoading(false); });
      }, []);

      if (loading) return e('div', { className: 'loading' }, 'Loading OM...');
      if (!data) return e('div', { className: 'error' }, 'Failed to load OM data');

      return e('div', null,
        e('div', { className: 'card' },
          e('div', { className: 'card-header' }, '👥 OM Performance'),
          data.oms ? e('div', null,
            'OMs: ' + data.oms.length
          ) : 'No OMs data'
        )
      );
    }

    function App() {
      const [tab, setTab] = useState('ttgl');
      
      return e('div', null,
        e('h1', null, '🌍 Onboarding Metrics Dashboard'),
        e('div', { className: 'tabs' },
          e('button', { className: tab === 'ttgl' ? 'active' : 'inactive', onClick: () => setTab('ttgl') }, '📊 TTGL'),
          e('button', { className: tab === 'revrec' ? 'active' : 'inactive', onClick: () => setTab('revrec') }, '💰 RevRec'),
          e('button', { className: tab === 'om' ? 'active' : 'inactive', onClick: () => setTab('om') }, '👥 OM')
        ),
        e('div', null,
          tab === 'ttgl' && e(TTGLSection),
          tab === 'revrec' && e(RevRecSection),
          tab === 'om' && e(OMSection)
        )
      );
    }

    // Render the app
    try {
      const container = document.getElementById('root');
      const root = ReactDOM.createRoot(container);
      root.render(e(App));
      console.log('App rendered successfully');
    } catch (err) {
      console.error('Render error:', err);
      document.getElementById('root').innerHTML = '<div class="error">Failed to initialize app: ' + err.message + '</div>';
    }
  </script>
</body>
</html>
