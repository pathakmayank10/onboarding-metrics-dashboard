<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding Metrics Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
    }
    #root { max-width: 1600px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 30px; font-size: 32px; }
    h3 { font-size: 14px; margin-top: 20px; margin-bottom: 10px; color: #e2e8f0; }
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
    }
    button.active { background: #2563eb; color: white; }
    button.inactive { background: #475569; color: #cbd5e1; }
    button:hover { opacity: 0.9; }
    .content { display: none; }
    .content.active { display: block; }
    .card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .card-header {
      background: #1e3a5f;
      color: white;
      padding: 10px 16px;
      border-radius: 4px;
      margin: -20px -20px 15px -20px;
      font-weight: 600;
      font-size: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      margin-bottom: 20px;
    }
    th {
      background: #1e3a5f;
      color: white;
      padding: 8px;
      text-align: left;
      border: 1px solid #334155;
      font-weight: 600;
    }
    td {
      background: #162032;
      border: 1px solid #334155;
      padding: 6px 8px;
      text-align: left;
    }
    tr:hover td { background: #1e293b; }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    .info-card {
      background: #162032;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 12px;
      text-align: center;
    }
    .info-card-value { font-size: 20px; font-weight: 700; color: #60a5fa; margin: 8px 0; }
    .info-card-label { font-size: 10px; color: #94a3b8; }
    .error { color: #ef4444; padding: 20px; text-align: center; }
  </style>
</head>
<body>
  <div id="root">
    <h1>🌍 Onboarding Metrics Dashboard</h1>
    <div class="tabs">
      <button class="active" onclick="switchTab('ttgl')">📊 TTGL</button>
      <button class="inactive" onclick="switchTab('revrec')">💰 RevRec</button>
      <button class="inactive" onclick="switchTab('om')">👥 OM</button>
    </div>
    <div id="ttgl" class="content active"></div>
    <div id="revrec" class="content"></div>
    <div id="om" class="content"></div>
  </div>

  <script>
    async function init() {
      try {
        const [ttgl, revrec, om] = await Promise.all([
          fetch('./ttgl_data.json').then(r => r.json()),
          fetch('./revrec_data.json').then(r => r.json()),
          fetch('./om_performance.json').then(r => r.json())
        ]);
        
        console.log('Data loaded successfully');
        renderTTGL(ttgl);
        renderRevRec(revrec);
        renderOM(om);
      } catch (err) {
        console.error('Load error:', err);
        document.getElementById('root').innerHTML = '<div class="error">Failed to load data: ' + err.message + '</div>';
      }
    }

    function renderTTGL(data) {
      if (!data || !data.ttglData) {
        document.getElementById('ttgl').innerHTML = '<div class="error">No TTGL data</div>';
        return;
      }

      let html = '<div class="card"><div class="card-header">📊 TTGL by Region</div>';
      
      // Region summary cards
      html += '<div class="cards-grid">';
      data.ttglData.forEach(r => {
        const values = Object.values(r.months || {});
        const avg = values.length > 0 ? (values.reduce((a, b) => a + b, 0) / values.length) : 0;
        html += `<div class="info-card">
          <div>${r.region}</div>
          <div class="info-card-value">${avg.toFixed(1)}d</div>
          <div class="info-card-label">Avg TTGL</div>
        </div>`;
      });
      html += '</div>';

      // TTGL Table
      html += '<h3>TTGL by Month</h3><table><thead><tr><th>Region</th>';
      if (data.months) {
        data.months.forEach(m => html += `<th>${m}</th>`);
      }
      html += '</tr></thead><tbody>';
      
      data.ttglData.forEach(r => {
        html += `<tr><td><b>${r.region}</b></td>`;
        if (data.months) {
          data.months.forEach(m => {
            const val = r.months && r.months[m] ? r.months[m].toFixed(1) : '-';
            html += `<td>${val}</td>`;
          });
        }
        html += '</tr>';
      });
      html += '</tbody></table></div>';
      
      document.getElementById('ttgl').innerHTML = html;
    }

    function renderRevRec(data) {
      if (!data || !data.regions) {
        document.getElementById('revrec').innerHTML = '<div class="error">No RevRec data</div>';
        return;
      }

      let html = '<div class="card"><div class="card-header">💰 Revenue Realisation</div>';
      
      // Pending MRR cards
      html += '<div class="cards-grid">';
      data.regions.forEach(r => {
        const pendingObj = data.openPendingMRR || {};
        const pendingMRR = pendingObj[r.name] || 0;
        html += `<div class="info-card">
          <div>${r.name}</div>
          <div class="info-card-value">$${pendingMRR.toLocaleString()}</div>
          <div class="info-card-label">Pending MRR</div>
        </div>`;
      });
      html += '</div>';

      // Cohort tables
      data.regions.forEach(region => {
        html += `<h3>${region.name} Cohorts</h3>
          <table>
            <thead>
              <tr>
                <th>Month</th>
                <th>CW</th>
                <th>M0</th>
                <th>M1</th>
                <th>M2</th>
                <th>M3</th>
                <th>M4</th>
                <th>M5</th>
                <th>M6+</th>
                <th>Realised</th>
                <th>%</th>
              </tr>
            </thead>
            <tbody>`;
        
        if (region.cohorts) {
          region.cohorts.forEach(c => {
            const pct = c.cwValue > 0 ? ((c.revRealised / c.cwValue) * 100).toFixed(1) : 0;
            html += `<tr>
              <td>${c.month}</td>
              <td>$${Math.round(c.cwValue)}</td>
              <td>${c.m0 ? '$' + Math.round(c.m0) : '-'}</td>
              <td>${c.m1 ? '$' + Math.round(c.m1) : '-'}</td>
              <td>${c.m2 ? '$' + Math.round(c.m2) : '-'}</td>
              <td>${c.m3 ? '$' + Math.round(c.m3) : '-'}</td>
              <td>${c.m4 ? '$' + Math.round(c.m4) : '-'}</td>
              <td>${c.m5 ? '$' + Math.round(c.m5) : '-'}</td>
              <td>${c.m6plus ? '$' + Math.round(c.m6plus) : '-'}</td>
              <td>$${Math.round(c.revRealised)}</td>
              <td>${pct}%</td>
            </tr>`;
          });
        }
        html += '</tbody></table>';
      });
      
      html += '</div>';
      document.getElementById('revrec').innerHTML = html;
    }

    function renderOM(data) {
      if (!data || !data.oms) {
        document.getElementById('om').innerHTML = '<div class="error">No OM data</div>';
        return;
      }

      let html = '<div class="card"><div class="card-header">👥 OM Performance</div>';
      
      // Summary cards
      if (data.summary) {
        html += '<div class="cards-grid">';
        html += `<div class="info-card">
          <div>Total OMs</div>
          <div class="info-card-value">${data.summary.totalOMs || 0}</div>
        </div>`;
        html += `<div class="info-card">
          <div>Total Projects</div>
          <div class="info-card-value">${data.summary.totalProjects || 0}</div>
        </div>`;
        html += `<div class="info-card">
          <div>Avg TTGL</div>
          <div class="info-card-value">${(data.summary.avgTTGL || 0).toFixed(1)}d</div>
        </div>`;
        html += '</div>';
      }

      // Leaderboard
      html += '<h3>OM Leaderboard (Top 30)</h3>';
      html += '<table><thead><tr><th>Name</th><th>Region</th><th>Total</th><th>Live</th><th>Drop</th><th>SLA %</th><th>TTGL</th><th>MRR $</th></tr></thead><tbody>';
      
      data.oms.slice(0, 30).forEach(om => {
        const regions = Array.isArray(om.regions) ? om.regions.join(', ') : om.regions || '-';
        const sla = om.slaPct !== null && om.slaPct !== undefined ? (om.slaPct * 100).toFixed(1) : '-';
        const ttgl = om.avgTTGL !== null && om.avgTTGL !== undefined ? om.avgTTGL.toFixed(1) + 'd' : '-';
        html += `<tr>
          <td>${om.name}</td>
          <td>${regions}</td>
          <td>${om.total || 0}</td>
          <td>${om.live || 0}</td>
          <td>${om.drop || 0}</td>
          <td>${sla}</td>
          <td>${ttgl}</td>
          <td>$${(om.mrrRealised || 0).toLocaleString()}</td>
        </tr>`;
      });
      
      html += '</tbody></table></div>';
      document.getElementById('om').innerHTML = html;
    }

    function switchTab(tab) {
      document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      
      document.querySelectorAll('button').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('button').forEach((el, i) => {
        if ((i === 0 && tab === 'ttgl') || (i === 1 && tab === 'revrec') || (i === 2 && tab === 'om')) {
          el.classList.add('active');
        } else {
          el.classList.add('inactive');
        }
      });
    }

    // Start
    init();
  </script>
</body>
</html>
