[build]
  # No build command needed - files are pre-built
  command = "echo 'Pre-built deployment'"
  publish = "."

# Handle SPA routing - all non-file requests go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache JSON files with 1-hour max-age (they refresh daily at 8 AM IST)
[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Cache static assets longer
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
